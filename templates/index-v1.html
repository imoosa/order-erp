<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrderFlow — Order Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --bg2: #16161a;
  --bg3: #1e1e24;
  --bg4: #26262e;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #e8e8ec;
  --text2: #9898a8;
  --text3: #5c5c70;
  --accent: #7c6af7;
  --accent2: #9b8fff;
  --accent-glow: rgba(124,106,247,0.2);
  --success: #3ecf8e;
  --success-bg: rgba(62,207,142,0.1);
  --warn: #f59e0b;
  --warn-bg: rgba(245,158,11,0.1);
  --danger: #ef4444;
  --danger-bg: rgba(239,68,68,0.1);
  --info: #38bdf8;
  --info-bg: rgba(56,189,248,0.1);
  --radius: 10px;
  --radius-lg: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);position:fixed;inset:0;z-index:1000;transition:opacity 0.4s}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);padding:48px 40px;width:100%;max-width:400px;box-shadow:0 32px 64px rgba(0,0,0,0.6)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo h1{font-size:28px;font-weight:600;letter-spacing:-0.5px}
.login-logo h1 span{color:var(--accent)}
.login-logo p{color:var(--text2);font-size:13px;margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.form-group input,.form-group select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.btn-primary{width:100%;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);padding:13px;font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:8px}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.demo-hint{text-align:center;margin-top:20px;font-size:12px;color:var(--text3);line-height:1.8}
.demo-hint code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-family:'DM Mono',monospace;color:var(--text2)}

/* ── LAYOUT ── */
#app{display:none;flex:1;flex-direction:column;min-height:100vh}
.topbar{height:60px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:18px;font-weight:600;letter-spacing:-0.3px;margin-right:8px}
.topbar-logo span{color:var(--accent)}
.topbar-nav{display:flex;gap:4px;flex:1}
.nav-btn{background:none;border:none;color:var(--text2);font-family:inherit;font-size:14px;padding:7px 14px;border-radius:8px;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{background:var(--accent-glow);color:var(--accent2)}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;display:flex;align-items:center;gap:8px}
.user-dot{width:8px;height:8px;background:var(--success);border-radius:50%}
.btn-logout{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 14px;color:var(--text2);font-family:inherit;font-size:13px;cursor:pointer;transition:all 0.2s}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}

.main{flex:1;padding:28px 24px;max-width:1400px;margin:0 auto;width:100%}

/* ── VIEWS ── */
.view{display:none}
.view.active{display:block}

/* ── DASHBOARD ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px;cursor:pointer;transition:all 0.2s}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-card.active-filter{border-color:var(--accent);background:var(--accent-glow)}
.stat-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.stat-value{font-size:32px;font-weight:600;letter-spacing:-1px;line-height:1}
.stat-sub{font-size:12px;color:var(--text3);margin-top:6px}
.stat-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.section-title{font-size:17px;font-weight:500}
.filters{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filter-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-family:inherit;font-size:13px;outline:none;transition:border-color 0.2s}
.filter-input:focus{border-color:var(--accent)}
.filter-input::placeholder{color:var(--text3)}

/* ── TABLE ── */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:12px 16px;text-align:left;font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background 0.15s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg3)}
td{padding:13px 16px;vertical-align:middle}
.order-id{font-family:'DM Mono',monospace;font-size:12px;color:var(--accent2)}
.client-name{font-weight:500}
.client-sub{font-size:11px;color:var(--text2);margin-top:2px}
.source-badge{display:inline-flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 9px;font-size:11px;font-weight:500}
.time-cell{font-size:11px;color:var(--text2);white-space:nowrap}

/* ── STATUS BADGES ── */
.status-badge{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 10px;font-size:11px;font-weight:500;white-space:nowrap}
.status-badge::before{content:'';display:inline-block;width:5px;height:5px;border-radius:50%}
.s-Received{background:rgba(148,163,184,0.1);color:#94a3b8}.s-Received::before{background:#94a3b8}
.s-Credit-Check{background:var(--warn-bg);color:var(--warn)}.s-Credit-Check::before{background:var(--warn)}
.s-Approved{background:var(--success-bg);color:var(--success)}.s-Approved::before{background:var(--success)}
.s-Sent-to-Partner{background:var(--info-bg);color:var(--info)}.s-Sent-to-Partner::before{background:var(--info)}
.s-Repair-Started{background:rgba(168,85,247,0.1);color:#c084fc}.s-Repair-Started::before{background:#c084fc}
.s-Waiting-Parts{background:rgba(245,158,11,0.15);color:#fbbf24}.s-Waiting-Parts::before{background:#fbbf24}
.s-Returned{background:var(--info-bg);color:#7dd3fc}.s-Returned::before{background:#7dd3fc}
.s-QC-Pending{background:rgba(239,68,68,0.1);color:#fca5a5}.s-QC-Pending::before{background:#fca5a5}
.s-QC-Passed{background:var(--success-bg);color:#86efac}.s-QC-Passed::before{background:#86efac}
.s-Billing{background:rgba(234,179,8,0.1);color:#fde047}.s-Billing::before{background:#fde047}
.s-Paid{background:var(--success-bg);color:var(--success)}.s-Paid::before{background:var(--success)}
.s-Dispatched{background:var(--accent-glow);color:var(--accent2)}.s-Dispatched::before{background:var(--accent2)}
.s-Delivered{background:rgba(16,185,129,0.15);color:#6ee7b7;border:1px solid rgba(16,185,129,0.3)}.s-Delivered::before{background:#6ee7b7}

/* ── ACTION BUTTONS ── */
.btn{border:none;border-radius:8px;padding:9px 16px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:6px}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-accent{background:var(--accent);color:#fff}
.btn-accent:hover{background:var(--accent2)}
.btn-ghost{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--border2);color:var(--text)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(239,68,68,0.2)}
.btn-danger:hover{background:rgba(239,68,68,0.2)}
.btn-success{background:var(--success-bg);color:var(--success);border:1px solid rgba(62,207,142,0.2)}
.btn-success:hover{background:rgba(62,207,142,0.2)}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.7)}
.modal-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:18px;font-weight:600}
.modal-close{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;line-height:1;transition:color 0.2s}
.modal-close:hover{color:var(--text)}
.modal-body{padding:24px 28px}
.modal-footer{padding:0 28px 24px;display:flex;gap:10px;justify-content:flex-end}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:12px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:11px 13px;color:var(--text);font-family:inherit;font-size:14px;outline:none;transition:border-color 0.2s;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{min-height:80px}

/* ── ORDER DETAIL ── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
.detail-section{background:var(--bg3);border-radius:var(--radius);padding:18px}
.detail-section h3{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:14px}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;font-size:13px}
.detail-row:last-child{margin-bottom:0}
.detail-key{color:var(--text2)}
.detail-val{font-weight:500;text-align:right;max-width:60%}

.pipeline{display:flex;align-items:center;margin-bottom:24px;gap:0;overflow-x:auto;padding-bottom:4px}
.pipeline-step{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;flex:1;min-width:70px}
.pipeline-step::after{content:'';position:absolute;top:12px;left:50%;width:100%;height:2px;background:var(--border);z-index:0}
.pipeline-step:last-child::after{display:none}
.pipeline-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:var(--bg2);z-index:1;transition:all 0.3s;display:flex;align-items:center;justify-content:center;font-size:10px}
.pipeline-step.done .pipeline-dot{background:var(--success);border-color:var(--success);color:#fff}
.pipeline-step.done::after{background:var(--success)}
.pipeline-step.current .pipeline-dot{background:var(--accent);border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-glow)}
.pipeline-label{font-size:9px;color:var(--text3);text-align:center;line-height:1.2;max-width:60px}
.pipeline-step.done .pipeline-label,.pipeline-step.current .pipeline-label{color:var(--text2)}

.timeline{margin-top:4px}
.timeline-item{display:flex;gap:14px;margin-bottom:16px}
.timeline-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0}
.timeline-item:first-child .timeline-dot{background:var(--success)}
.timeline-content{flex:1}
.timeline-status{font-size:13px;font-weight:500}
.timeline-meta{font-size:11px;color:var(--text2);margin-top:2px}
.timeline-note{font-size:12px;color:var(--text3);margin-top:4px;font-style:italic}

/* ── FLOW VIEW ── */
.flow-board{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.flow-col{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.flow-col-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.flow-col-title{font-size:13px;font-weight:500}
.flow-col-count{font-size:11px;background:var(--bg3);border-radius:12px;padding:2px 8px;color:var(--text2)}
.flow-cards{padding:12px;display:flex;flex-direction:column;gap:8px;min-height:60px}
.flow-card{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;cursor:pointer;transition:all 0.15s}
.flow-card:hover{border-color:var(--accent);transform:translateX(2px)}
.flow-card-id{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent2);margin-bottom:4px}
.flow-card-name{font-size:12px;font-weight:500}
.flow-card-item{font-size:11px;color:var(--text2);margin-top:2px}
.flow-card-time{font-size:10px;color:var(--text3);margin-top:6px}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px 18px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.5);animation:slideUp 0.3s ease;max-width:320px}
.toast.success{border-color:rgba(62,207,142,0.3)}
.toast.error{border-color:rgba(239,68,68,0.3)}
@keyframes slideUp{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.toast-icon{font-size:16px}

/* ── EMPTY ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.empty-state h3{font-size:16px;margin-bottom:6px;color:var(--text)}
.empty-state p{font-size:13px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border2)}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .form-row{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <h1>Order<span>Flow</span></h1>
      <p>Order Management System</p>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Enter username" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="doLogin()">Sign In</button>
    <div class="demo-hint">
      Demo accounts:<br>
      <code>admin</code> / <code>admin123</code> &nbsp;·&nbsp; <code>teama</code> / <code>teama123</code><br>
      <code>teamb</code> / <code>teamb123</code> &nbsp;·&nbsp; <code>partner_a</code> / <code>partner123</code>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">Order<span>Flow</span></div>
    <div class="topbar-nav">
      <button class="nav-btn active" data-view="dashboard" onclick="switchView('dashboard',this)">
        📊 Dashboard
      </button>
      <button class="nav-btn" data-view="orders" onclick="switchView('orders',this)">
        📋 Orders
      </button>
      <button class="nav-btn" data-view="flow" onclick="switchView('flow',this)">
        🔄 Flow Board
      </button>
    </div>
    <div class="topbar-right">
      <div class="user-badge">
        <span class="user-dot"></span>
        <span id="user-label">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="main">

    <!-- DASHBOARD VIEW -->
    <div class="view active" id="view-dashboard">
      <div class="stats-grid" id="stats-grid"></div>
      <div class="section-header">
        <span class="section-title">Recent Orders</span>
        <button class="btn btn-accent" onclick="openCreateModal()">+ New Order</button>
      </div>
      <div class="table-wrap" id="recent-table-wrap"></div>
    </div>

    <!-- ORDERS VIEW -->
    <div class="view" id="view-orders">
      <div class="section-header" style="margin-bottom:16px">
        <span class="section-title">All Orders</span>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <input class="filter-input" id="search-input" placeholder="Search orders…" oninput="filterOrders()">
          <select class="filter-input" id="status-filter" onchange="filterOrders()">
            <option value="">All Statuses</option>
          </select>
          <select class="filter-input" id="source-filter" onchange="filterOrders()">
            <option value="">All Sources</option>
            <option>Phone</option><option>Email</option><option>Web Form</option><option>Direct</option>
          </select>
          <button class="btn btn-accent" onclick="openCreateModal()">+ New Order</button>
        </div>
      </div>
      <div class="table-wrap" id="orders-table-wrap"></div>
    </div>

    <!-- FLOW VIEW -->
    <div class="view" id="view-flow">
      <div class="section-header">
        <span class="section-title">Flow Board</span>
        <button class="btn btn-accent" onclick="openCreateModal()">+ New Order</button>
      </div>
      <div class="flow-board" id="flow-board"></div>
    </div>

  </div>
</div>

<!-- CREATE ORDER MODAL -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">New Order</span>
      <button class="modal-close" onclick="closeModal('create-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>Client Name *</label>
          <input type="text" id="f-name" placeholder="Full name">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" id="f-phone" placeholder="+91 …">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="f-email" placeholder="client@email.com">
        </div>
        <div class="form-group">
          <label>Source *</label>
          <select id="f-source">
            <option>Phone</option><option>Email</option><option>Web Form</option><option>Direct</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Item / Device Description *</label>
        <input type="text" id="f-item" placeholder="e.g. iPhone 14 Pro — cracked screen">
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Additional details…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('create-modal')">Cancel</button>
      <button class="btn btn-accent" onclick="submitOrder()">Create Order</button>
    </div>
  </div>
</div>

<!-- ORDER DETAIL MODAL -->
<div class="modal-overlay" id="detail-modal">
  <div class="modal" style="max-width:700px">
    <div class="modal-header">
      <span class="modal-title" id="detail-title">Order Detail</span>
      <button class="modal-close" onclick="closeModal('detail-modal')">×</button>
    </div>
    <div class="modal-body" id="detail-body"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>
</div>

<!-- STATUS UPDATE MODAL -->
<div class="modal-overlay" id="status-modal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <span class="modal-title">Update Status</span>
      <button class="modal-close" onclick="closeModal('status-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>New Status</label>
        <select id="s-status" onchange="togglePartnerField()"></select>
      </div>
      <div class="form-group" id="partner-field" style="display:none">
        <label>Assign Partner</label>
        <select id="s-partner">
          <option>Partner A</option><option>Partner B</option><option>Partner C</option>
        </select>
      </div>
      <div class="form-group">
        <label>Note (optional)</label>
        <textarea id="s-note" placeholder="Add a note about this update…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('status-modal')">Cancel</button>
      <button class="btn btn-accent" onclick="submitStatusUpdate()">Update Status</button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toasts"></div>

<script>
const API = '';
let currentUser = null;
let allOrders = [];
let statusList = [];
let currentOrderId = null;

// ── AUTH ──
async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value.trim();
  if (!username || !password) return toast('Please enter credentials', 'error');
  try {
    const r = await fetch(API + '/api/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const d = await r.json();
    if (d.success) {
      currentUser = d.user;
      document.getElementById('user-label').textContent = d.user.full_name || d.user.username;
      document.getElementById('login-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
      }, 350);
      loadStatuses();
      loadDashboard();
    } else {
      toast('Invalid credentials', 'error');
    }
  } catch(e) { toast('Connection error', 'error'); }
}
document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-screen').style.opacity = '1';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

// ── NAV ──
function switchView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'dashboard') loadDashboard();
  if (name === 'orders') loadOrders();
  if (name === 'flow') loadFlowBoard();
}

// ── STATUS ──
async function loadStatuses() {
  const r = await fetch(API + '/api/statuses');
  statusList = await r.json();
  // Populate status filter
  const sf = document.getElementById('status-filter');
  statusList.forEach(s => {
    const o = document.createElement('option'); o.value = s; o.textContent = s; sf.appendChild(o);
  });
  // Populate status update select
  const ss = document.getElementById('s-status');
  statusList.forEach(s => {
    const o = document.createElement('option'); o.value = s; o.textContent = s; ss.appendChild(o);
  });
}

function statusClass(s) { return 's-' + s.replace(/ /g, '-'); }

function statusBadge(s) {
  return `<span class="status-badge ${statusClass(s)}">${s}</span>`;
}

// ── DASHBOARD ──
async function loadDashboard() {
  const [stats, orders] = await Promise.all([
    fetch(API + '/api/stats').then(r => r.json()),
    fetch(API + '/api/orders').then(r => r.json())
  ]);
  allOrders = orders;

  // Stats grid
  const grid = document.getElementById('stats-grid');
  const colors = {
    'Received':'#94a3b8','Credit Check':'#f59e0b','Approved':'#3ecf8e',
    'Sent to Partner':'#38bdf8','Repair Started':'#c084fc','Waiting Parts':'#fbbf24',
    'Returned':'#7dd3fc','QC Pending':'#fca5a5','QC Passed':'#86efac',
    'Billing':'#fde047','Paid':'#3ecf8e','Dispatched':'#9b8fff','Delivered':'#6ee7b7'
  };

  let html = `
    <div class="stat-card" onclick="filterByStatus('')">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value">${stats.total}</div>
      <div class="stat-sub">All time</div>
    </div>
  `;
  const priority = ['Received','Credit Check','QC Pending','Waiting Parts','Dispatched','Delivered'];
  priority.forEach(s => {
    const cnt = stats.by_status[s] || 0;
    html += `
      <div class="stat-card" onclick="filterByStatus('${s}')">
        <div class="stat-label"><span class="stat-dot" style="background:${colors[s]}"></span>${s}</div>
        <div class="stat-value" style="color:${colors[s]}">${cnt}</div>
        <div class="stat-sub">orders</div>
      </div>`;
  });
  grid.innerHTML = html;

  // Recent table (last 10)
  document.getElementById('recent-table-wrap').innerHTML = renderTable(orders.slice(0,10));
}

function filterByStatus(status) {
  switchView('orders', document.querySelector('[data-view="orders"]'));
  document.getElementById('status-filter').value = status;
  filterOrders();
}

// ── ORDERS TABLE ──
function renderTable(orders) {
  if (!orders.length) return `<div class="empty-state"><div class="empty-icon">📭</div><h3>No orders found</h3><p>Try adjusting your filters</p></div>`;
  let html = `<div class="table-scroll"><table>
    <thead><tr>
      <th>Order ID</th><th>Client</th><th>Item</th><th>Source</th>
      <th>Status</th><th>Partner</th><th>Created</th>
    </tr></thead><tbody>`;
  orders.forEach(o => {
    html += `<tr onclick="openDetail('${o.id}')">
      <td><span class="order-id">${o.id}</span></td>
      <td><div class="client-name">${esc(o.client_name)}</div><div class="client-sub">${esc(o.client_phone||'')}</div></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(o.item_description)}</td>
      <td><span class="source-badge">${esc(o.source)}</span></td>
      <td>${statusBadge(o.status)}</td>
      <td style="color:var(--text2);font-size:12px">${o.partner||'—'}</td>
      <td class="time-cell">${formatDate(o.created_at)}</td>
    </tr>`;
  });
  return html + '</tbody></table></div>';
}

async function loadOrders() {
  const search = document.getElementById('search-input').value;
  const status = document.getElementById('status-filter').value;
  const source = document.getElementById('source-filter').value;
  let url = API + '/api/orders?';
  if (status) url += 'status=' + encodeURIComponent(status) + '&';
  if (source) url += 'source=' + encodeURIComponent(source) + '&';
  if (search) url += 'search=' + encodeURIComponent(search) + '&';
  const orders = await fetch(url).then(r => r.json());
  allOrders = orders;
  document.getElementById('orders-table-wrap').innerHTML = renderTable(orders);
}

function filterOrders() { loadOrders(); }

// ── FLOW BOARD ──
async function loadFlowBoard() {
  const orders = await fetch(API + '/api/orders').then(r => r.json());
  const byStatus = {};
  statusList.forEach(s => byStatus[s] = []);
  orders.forEach(o => { if (byStatus[o.status]) byStatus[o.status].push(o); });

  let html = '';
  statusList.forEach(s => {
    const cards = byStatus[s];
    const cardHtml = cards.length ? cards.map(o => `
      <div class="flow-card" onclick="openDetail('${o.id}')">
        <div class="flow-card-id">${o.id}</div>
        <div class="flow-card-name">${esc(o.client_name)}</div>
        <div class="flow-card-item">${esc(o.item_description.substring(0,40))}${o.item_description.length>40?'…':''}</div>
        <div class="flow-card-time">${formatDate(o.updated_at)}</div>
      </div>`).join('') :
      '<div style="font-size:11px;color:var(--text3);text-align:center;padding:8px">Empty</div>';

    html += `<div class="flow-col">
      <div class="flow-col-head">
        <span class="flow-col-title">${statusBadge(s)}</span>
        <span class="flow-col-count">${cards.length}</span>
      </div>
      <div class="flow-cards">${cardHtml}</div>
    </div>`;
  });
  document.getElementById('flow-board').innerHTML = html;
}

// ── ORDER DETAIL ──
async function openDetail(id) {
  currentOrderId = id;
  const data = await fetch(API + '/api/orders/' + id).then(r => r.json());
  const {order, history} = data;

  document.getElementById('detail-title').textContent = id;

  // Pipeline
  const ci = statusList.indexOf(order.status);
  const pipeHtml = `<div class="pipeline">${statusList.map((s,i) => {
    const done = i < ci, cur = i === ci;
    return `<div class="pipeline-step ${done?'done':''} ${cur?'current':''}">
      <div class="pipeline-dot">${done?'✓':''}</div>
      <div class="pipeline-label">${s}</div>
    </div>`;
  }).join('')}</div>`;

  // Timeline
  const tlHtml = `<div class="timeline">${history.slice().reverse().map(h => `
    <div class="timeline-item">
      <div class="timeline-dot"></div>
      <div class="timeline-content">
        <div class="timeline-status">${statusBadge(h.status)}</div>
        <div class="timeline-meta">${h.changed_by} · ${formatDate(h.changed_at)}</div>
        ${h.note?`<div class="timeline-note">${esc(h.note)}</div>`:''}
      </div>
    </div>`).join('')}</div>`;

  document.getElementById('detail-body').innerHTML = `
    ${pipeHtml}
    <div class="detail-grid">
      <div class="detail-section">
        <h3>Client Info</h3>
        <div class="detail-row"><span class="detail-key">Name</span><span class="detail-val">${esc(order.client_name)}</span></div>
        <div class="detail-row"><span class="detail-key">Phone</span><span class="detail-val">${esc(order.client_phone||'—')}</span></div>
        <div class="detail-row"><span class="detail-key">Email</span><span class="detail-val">${esc(order.client_email||'—')}</span></div>
        <div class="detail-row"><span class="detail-key">Source</span><span class="detail-val">${esc(order.source)}</span></div>
      </div>
      <div class="detail-section">
        <h3>Order Info</h3>
        <div class="detail-row"><span class="detail-key">Item</span><span class="detail-val">${esc(order.item_description)}</span></div>
        <div class="detail-row"><span class="detail-key">Status</span><span class="detail-val">${statusBadge(order.status)}</span></div>
        <div class="detail-row"><span class="detail-key">Partner</span><span class="detail-val">${esc(order.partner||'—')}</span></div>
        <div class="detail-row"><span class="detail-key">Created</span><span class="detail-val">${formatDate(order.created_at)}</span></div>
        ${order.notes?`<div class="detail-row"><span class="detail-key">Notes</span><span class="detail-val">${esc(order.notes)}</span></div>`:''}
      </div>
    </div>
    <div class="detail-section">
      <h3>Status History</h3>
      ${tlHtml}
    </div>`;

  document.getElementById('detail-footer').innerHTML = `
    <button class="btn btn-danger btn-sm" onclick="deleteOrder('${id}')">Delete</button>
    <button class="btn btn-ghost btn-sm" onclick="closeModal('detail-modal')">Close</button>
    <button class="btn btn-accent btn-sm" onclick="openStatusModal('${id}','${order.status}')">Update Status</button>`;

  document.getElementById('detail-modal').classList.add('open');
}

// ── STATUS UPDATE ──
function openStatusModal(id, currentStatus) {
  currentOrderId = id;
  const sel = document.getElementById('s-status');
  sel.value = currentStatus;
  document.getElementById('s-note').value = '';
  togglePartnerField();
  document.getElementById('status-modal').classList.add('open');
}

function togglePartnerField() {
  const v = document.getElementById('s-status').value;
  document.getElementById('partner-field').style.display = v === 'Sent to Partner' ? 'block' : 'none';
}

async function submitStatusUpdate() {
  const status = document.getElementById('s-status').value;
  const note = document.getElementById('s-note').value;
  const partner = status === 'Sent to Partner' ? document.getElementById('s-partner').value : undefined;
  const r = await fetch(API + '/api/orders/' + currentOrderId + '/status', {
    method: 'PUT', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({status, note, partner, changed_by: currentUser?.full_name || 'Team A'})
  });
  const d = await r.json();
  if (d.success) {
    toast('Status updated to ' + status, 'success');
    closeModal('status-modal');
    closeModal('detail-modal');
    refreshCurrentView();
  }
}

// ── CREATE ORDER ──
function openCreateModal() {
  ['f-name','f-phone','f-email','f-item','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('create-modal').classList.add('open');
}

async function submitOrder() {
  const name = document.getElementById('f-name').value.trim();
  const item = document.getElementById('f-item').value.trim();
  if (!name || !item) return toast('Client name and item are required', 'error');
  const body = {
    client_name: name,
    client_phone: document.getElementById('f-phone').value,
    client_email: document.getElementById('f-email').value,
    item_description: item,
    source: document.getElementById('f-source').value,
    notes: document.getElementById('f-notes').value,
    created_by: currentUser?.full_name || 'Team A'
  };
  const r = await fetch(API + '/api/orders', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  const d = await r.json();
  if (d.success) {
    toast('Order ' + d.order_id + ' created!', 'success');
    closeModal('create-modal');
    refreshCurrentView();
  }
}

// ── DELETE ──
async function deleteOrder(id) {
  if (!confirm('Delete order ' + id + '? This cannot be undone.')) return;
  await fetch(API + '/api/orders/' + id, {method:'DELETE'});
  toast('Order deleted', 'success');
  closeModal('detail-modal');
  refreshCurrentView();
}

// ── UTILS ──
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(s) {
  if (!s) return '—';
  const d = new Date(s + ' UTC');
  return d.toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}) + ' ' +
         d.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'});
}
function refreshCurrentView() {
  const active = document.querySelector('.nav-btn.active')?.dataset.view;
  if (active === 'dashboard') loadDashboard();
  else if (active === 'orders') loadOrders();
  else if (active === 'flow') loadFlowBoard();
}
function toast(msg, type='success') {
  const wrap = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.innerHTML = `<span class="toast-icon">${type==='success'?'✓':'✗'}</span><span>${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// Close modals on backdrop click
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
</script>
</body>
</html>
